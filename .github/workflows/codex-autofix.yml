name: Codex Auto-fix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (example: feature/break-ci)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests (capture logs)
        id: pretests
        run: |
          set +e
          uv run pytest -q 2>&1 | tee pytest.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex non-interactively
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex/prompts/fix-ci.prompt.md
          sandbox: workspace-write

      - name: Enforce protected paths
        run: |
          # Never allow auto-fix to alter tests or workflow policy files.
          git restore --worktree --staged tests .github/workflows .codex/prompts || true

      - name: Show diff summary after Codex
        run: |
          echo "Changed files after Codex run:"
          git status --short
          git --no-pager diff --stat

      - name: Re-run tests (must be green)
        run: uv run pytest -q

      - name: Commit and push fix
        run: |
          git config user.name "codex-autofix-bot"
          git config user.email "codex-autofix-bot@users.noreply.github.com"
          rm -f pytest.log

          if git diff --quiet; then
            if [ "${{ steps.pretests.outputs.exit_code }}" != "0" ]; then
              echo "Tests were failing before auto-fix, but Codex produced no patch."
              echo "Check OPENAI_API_KEY secret, branch input, and Codex action logs."
              exit 1
            fi

            echo "No changes were needed because tests were already passing."
            exit 0
          fi

          git add -A
          git commit -m "autofix: make CI green"
          git push origin "${{ inputs.branch }}"
